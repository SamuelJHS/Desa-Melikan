name: Docker Build and Publish

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/desa-melikan-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/desa-melikan-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/desa-melikan-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/desa-melikan-frontend:buildcache,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/desa-melikan-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/desa-melikan-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/desa-melikan-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/desa-melikan-backend:buildcache,mode=max

      - name: Update Infrastructure Repository
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Infra-for-Melikan
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Commit and Push new tags to Infra
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          cd infra-repo
          sed -i -E 's|image: (.*)/desa-melikan-frontend:.*|image: \1/desa-melikan-frontend:'"${{ github.sha }}"'|' docker-compose.yml
          sed -i -E 's|image: (.*)/desa-melikan-backend:.*|image: \1/desa-melikan-backend:'"${{ github.sha }}"'|' docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update images to ${{ github.sha }}"
          git push
